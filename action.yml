description: 'Flags potentially slow SQL in pull requests.'
inputs:
  config:
    description: 'Path to .query-lens.yml'
    required: false
    default: '.query-lens.yml'
  anthropic-api-key:
    description: 'Anthropic API key (passed via env to the CLI)'
    required: true
  database-url:
    description: 'Connection string to the target database (overrides config)'
    required: false
runs:
  using: 'node20'
  main: 'dist/cli.js'
